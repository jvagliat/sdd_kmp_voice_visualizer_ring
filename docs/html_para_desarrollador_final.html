<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asistente OposiBots Supremo</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            /* FONDO AZUL NOCHE */
            background: radial-gradient(circle at center, #1c2244 0%, #0a0d1d 100%);
            overflow: hidden;
            font-family: sans-serif;
        }
        .container {
            position: relative;
            width: 120px; 
            height: 120px;
            transform: scale(var(--scale, 1));
            transition: transform 0.05s ease-out;
        }
        .circle {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 5px solid rgba(0, 255, 255, 0.8);
            border-radius: 50%;
            background: transparent;
            box-shadow: 
                0 0 15px rgba(0, 255, 255, 0.7),         
                0 0 40px rgba(0, 255, 255, 0.4),         
                0 0 70px rgba(0, 255, 204, 0.2),         
                inset 0 0 15px rgba(0, 255, 255, 0.7),   
                inset 0 0 40px rgba(0, 255, 255, 0.4),   
                inset 0 0 70px rgba(0, 255, 204, 0.2);   
            
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            animation: wave 8s infinite ease-in-out;
            filter: blur(0.3px);
            opacity: var(--bright, 0.8);
            transition: opacity 0.05s ease-out;
        }
        .circle:nth-child(2) { 
            animation-delay: -2.5s; 
            box-shadow: 0 0 30px rgba(0, 204, 204, 0.3), inset 0 0 30px rgba(0, 204, 204, 0.3); 
        }
        .circle:nth-child(3) { 
            animation-delay: -5s; 
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.2), inset 0 0 20px rgba(0, 255, 255, 0.2);
        }
        @keyframes wave {
            0%, 100% { transform: rotate(0deg); border-radius: 50% 45% 60% 45% / 45% 60% 45% 60%; }
            33% { transform: rotate(120deg); border-radius: 45% 60% 45% 55% / 60% 45% 60% 45%; }
            66% { transform: rotate(240deg); border-radius: 60% 45% 55% 60% / 45% 60% 45% 55%; }
        }
        /* Botones de prueba (quitar luego) */
        .controls { position: absolute; bottom: 50px; display: flex; flex-direction: column; align-items: center; z-index: 10; }
        button { padding: 12px 30px; background: rgba(0, 255, 255, 0.15); color: #00ffff; border: 1px solid rgba(0, 255, 255, 0.6); border-radius: 20px; backdrop-filter: blur(10px); font-weight: bold; cursor: pointer; margin-top: 15px; }
        input { color: rgba(255, 255, 255, 0.6); margin-bottom: 10px; font-size: 11px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="circle"></div>
        <div class="circle"></div>
        <div class="circle"></div>
    </div>
    <div class="controls">
        <input type="file" id="upload">
        <button id="btn">REPRODUCIR</button>
        <audio id="audio" crossorigin="anonymous"></audio>
    </div>
    <script>
        const upload = document.getElementById('upload');
        const btn = document.getElementById('btn');
        const audio = document.getElementById('audio');
        const container = document.querySelector('.container');
        const circles = document.querySelectorAll('.circle');
        let audioCtx, analyser, dataArray, source;
        let currentScale = 1;
        let currentBright = 0.8;
        upload.addEventListener('change', function() {
            if (this.files[0]) audio.src = URL.createObjectURL(this.files[0]);
        });
        btn.addEventListener('click', () => {
            if (!audio.src) return alert("Selecciona un audio primero");
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioCtx.createAnalyser();
                source = audioCtx.createMediaElementSource(audio);
                source.connect(analyser);
                analyser.connect(audioCtx.destination);
                analyser.smoothingTimeConstant = 0.85; 
                analyser.fftSize = 256;
                dataArray = new Uint8Array(analyser.frequencyBinCount);
                render();
            }
            audioCtx.resume();
            audio.paused ? audio.play() : audio.pause();
            btn.innerText = audio.paused ? "REPRODUCIR" : "PAUSAR";
        });
        function render() {
            requestAnimationFrame(render);
            analyser.getByteFrequencyData(dataArray);
            let sum = 0;
            for (let i = 2; i < 15; i++) sum += dataArray[i];
            let average = sum / 13;
            const targetScale = 1 + (average / 500);
            const targetBright = 0.4 + (average / 150);
            currentScale += (targetScale - currentScale) * 0.15;
            currentBright += (targetBright - currentBright) * 0.15;
            container.style.setProperty('--scale', currentScale);
            circles.forEach((c, index) => {
                let finalBright = index === 0 ? currentBright : currentBright * (1 - (index * 0.2));
                c.style.setProperty('--bright', finalBright);
            });
        }
    </script>
</body>
</html>
